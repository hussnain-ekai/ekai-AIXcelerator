name: Hybrid Release Gate

on:
  workflow_dispatch:
    inputs:
      cases_path:
        description: Benchmark cases JSONL path
        required: false
      predictions_path:
        description: Predictions JSON path
        required: false
      output_path:
        description: Output report path
        required: false
  pull_request:
    paths:
      - "ai-service/services/hybrid_eval.py"
      - "ai-service/scripts/run_hybrid_benchmark.py"
      - "ai-service/.benchmarks/**"
      - "scripts/run-hybrid-release-gate.sh"
      - ".github/workflows/hybrid-release-gate.yml"

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-service/requirements.txt

      - name: Resolve benchmark paths
        id: paths
        shell: bash
        run: |
          CASES="${{ github.event.inputs.cases_path }}"
          PREDS="${{ github.event.inputs.predictions_path }}"
          OUT="${{ github.event.inputs.output_path }}"
          [[ -n "$CASES" ]] || CASES="ai-service/.benchmarks/gold_cases_300.jsonl"
          [[ -n "$PREDS" ]] || PREDS="ai-service/.benchmarks/gold_predictions_300.json"
          [[ -n "$OUT" ]] || OUT="ai-service/.benchmarks/release_gate_report.json"
          echo "cases=$CASES" >> "$GITHUB_OUTPUT"
          echo "predictions=$PREDS" >> "$GITHUB_OUTPUT"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Run hybrid benchmark release gate
        run: |
          scripts/run-hybrid-release-gate.sh \
            "${{ steps.paths.outputs.cases }}" \
            "${{ steps.paths.outputs.predictions }}" \
            "${{ steps.paths.outputs.out }}"

      - name: Upload release gate report
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-release-gate-report
          path: ${{ steps.paths.outputs.out }}
