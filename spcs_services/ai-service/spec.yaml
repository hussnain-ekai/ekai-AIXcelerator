spec:
  container:
    - name: ai-service
      image: /ekaix/app/image_repo/ai-service:latest
      resources:
        requests:
          cpu: 1
          memory: 1Gi
        limits:
          cpu: 4
          memory: 4Gi
      env:
        PYTHONUNBUFFERED: "1"
      secrets:
        - snowflake-secret
        - llm-api-secret
      readinessProbe:
        port: 8001
        path: /health
  endpoint:
    - name: ai-service
      port: 8001
      public: false
